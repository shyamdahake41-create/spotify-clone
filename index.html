<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="utility.css">
  <title>'Spotify - Web Player: Music for everyone'</title>
</head>

<body>
  <div class="container flex bg-black">
    <div class="left  ">
      <div class="home bg-grey rounded m-1 p-1">
        <div class="logo"><img class="invert" src="logo.svg" alt=""></div>
        <ul>
          <li><img class="invert" src="home.svg" alt="home">Home</li>
          <li><img class="invert" src="search.svg" alt="home">Search</li>
        </ul>
      </div>
      <div class="library bg-grey m-1 p-1">
        <div class="heading">
          <h2>Your Library</h2>
          </div>
          <div class="songlist"><ul>
            
          </ul></div>
          <div class="footer">
            <div>
              <a href="https://www.spotify.com/in-en/legal/"><span>Legal</span></a>
            </div>
            <div>
              <a href="https://www.spotify.com/in-en/safetyandprivacy/">
                <span>Safety & Privacy Center</span>
              </a>
            </div>
            <div>
              <a href="https://www.spotify.com/in-en/legal/privacy-policy/">
                <span>Privacy Policy</span>
              </a>
            </div>
            <div>
              <a href="https://www.spotify.com/in-en/legal/cookies-policy/">
                <span>Cookies</span>
              </a>
            </div>
            <div>
              <a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3">
                <span>About Ads</span>
              </a>
            </div>
            <div>
              <a href="https://www.spotify.com/in-en/accessibility/">
                <span>Accessibility</span>
              </a>
            </div>
          </div>

        
      </div>

    </div>


    <div class="right bg-grey  ">
      <div class="header">

        <div class="nav flex ">
          <img class="invert" src="left.svg" alt="">
          <img class="invert" src="right.svg" alt="">
        </div>
        <div class="buttons flex">
          <button class="signupbtn">Sign up</button>
          <button class="loginbtn">Log in</button>
        </div>
      </div>
      <div class="spotifyPlaylist">
        <h1>Spotify Playlists</h1>
        <div class="cardContainer">
          <div class="card">
            <div class="play">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="24" height="24">
                <circle cx="320" cy="320" r="320" fill="green" />
                <path fill="black"
                  d="M187.2 100.9C174.8 94.1 159.8 94.4 147.6 101.6C135.4 108.8 128 121.9 128 136L128 504C128 518.1 135.5 531.2 147.6 538.4C159.7 545.6 174.8 545.9 187.2 539.1L523.2 355.1C536 348.1 544 334.6 544 320C544 305.4 536 291.9 523.2 284.9L187.2 100.9z" />
              </svg>
            </div>
            <img src="https://i.scdn.co/image/ab67616d00001e0212d5de3d8e314957260010a8" alt="">
            <h2>Majboor</h2>
            <p>Sheheryar Rehan,Zoha Waseem</p>
          </div>
        </div>
      </div>
      <div class="playbar">
        <div class="seekbar">
          
        </div>
        <div class="circle"></div>
        <div class="songinfo"></div>
        <div class="songbuttons">
          <img src="previous.svg" alt="">
          <img src="play.svg" alt="">
          <img src="next.svg" alt="">
        </div>
        <div class="songtime"></div>
      </div>
    </div>

  </div>
  <script src="script.js"></script>

</body>

</html>
